[tool.uv.workspace]
members = [
    "packages/sdk-python",
    "services/api",
    "services/workers",
    "eval-bench",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    ".venv",
    "node_modules",
    "dist",
    "build",
    "**/migrations/versions",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "C4",   # comprehensions
    "UP",   # pyupgrade
    "SIM",  # simplify
    "RUF",  # ruff-specific
    "N",    # naming
    "PT",   # pytest
    "PTH",  # use pathlib
]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
]

[tool.ruff.format]
docstring-code-format = true

[tool.pyright]
include = ["packages/sdk-python", "services/api", "services/workers", "eval-bench"]
exclude = ["**/node_modules", "**/dist", "**/build", "**/.venv"]
typeCheckingMode = "strict"
pythonVersion = "3.12"
reportMissingImports = "error"
reportMissingTypeStubs = "warning"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "packages", "services", "eval-bench"]
python_files = ["test_*.py", "*_test.py"]
addopts = "-ra --strict-markers --strict-config"
