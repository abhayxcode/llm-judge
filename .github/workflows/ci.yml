name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-js:
    name: js (lint + typecheck + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build

  lint-and-test-python:
    name: python (lint + typecheck + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Pin Python
        run: echo "3.12" > .python-version
      - run: uv sync --all-packages --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
        continue-on-error: true # not strict-blocking until typing debt cleared
      - run: uv run pytest

  lint-and-test-go:
    name: go (vet + test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/ingest/go.sum
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: services/ingest
      - run: go test -race -coverprofile=coverage.out ./...

  build-images:
    name: build container images
    runs-on: ubuntu-24.04
    needs: [lint-and-test-js, lint-and-test-python, lint-and-test-go]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [ingest, api, workers, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve build context
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            web) echo "context=." >> $GITHUB_OUTPUT; echo "dockerfile=apps/web/Dockerfile" >> $GITHUB_OUTPUT ;;
            *)   echo "context=services/${{ matrix.service }}" >> $GITHUB_OUTPUT; echo "dockerfile=services/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/judge-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/judge-${{ matrix.service }}:main
          cache-from: type=gha,scope=judge-${{ matrix.service }}
          cache-to: type=gha,scope=judge-${{ matrix.service }},mode=max
