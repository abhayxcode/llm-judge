version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      gh-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      js-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      py-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: gomod
    directory: "/services/ingest"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/deploy"
    schedule:
      interval: weekly
