# Local dev + simple self-host stack.
# Services (ingest, api, workers, web) get added as each is scaffolded.

name: llm-judge

services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-judge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge
      POSTGRES_PASSWORD: judge
      POSTGRES_DB: judge
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Postgres schema is managed by alembic, not init scripts.
      # Run migrations with: make migrate-pg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge -d judge"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: llm-judge-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: judge
      CLICKHOUSE_USER: judge
      CLICKHOUSE_PASSWORD: judge
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ../services/api/migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: llm-judge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: judge
      MINIO_ROOT_PASSWORD: judgejudge
    ports:
      - "9002:9000" # S3 API (avoids clash with ClickHouse 9000)
      - "9001:9001" # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: llm-judge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 judge judgejudge;
      mc mb -p local/judge-blobs || true;
      mc mb -p local/judge-exports || true;
      mc anonymous set none local/judge-blobs;
      mc anonymous set none local/judge-exports;
      echo 'minio buckets ready';
      "

  redis:
    image: redis:7-alpine
    container_name: llm-judge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest:
    build:
      context: ../services/ingest
      dockerfile: Dockerfile
    container_name: llm-judge-ingest
    restart: unless-stopped
    environment:
      INGEST_LISTEN_ADDR: ":4318"
      INGEST_ENV: local
    ports:
      - "4318:4318"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: llm-judge-api
    restart: unless-stopped
    environment:
      API_ENV: local
      API_HOST: 0.0.0.0
      API_PORT: "4000"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: judge
      PG_PASSWORD: judge
      PG_DB: judge
      CH_HOST: clickhouse
      CH_HTTP_PORT: "8123"
      CH_USER: judge
      CH_PASSWORD: judge
      CH_DB: judge
      REDIS_URL: redis://redis:6379/0
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  workers:
    build:
      context: ../services/workers
      dockerfile: Dockerfile
    container_name: llm-judge-workers
    restart: unless-stopped
    environment:
      WORKERS_ENV: local
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: llm-judge-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  minio-data:
  redis-data:

networks:
  default:
    name: llm-judge-net
