[project]
name = "judge"
version = "0.0.0"
description = "LLM Judge SDK for Python — trace + score LLM apps"
license = { text = "MIT" }
requires-python = ">=3.10"
readme = "README.md"
authors = [{ name = "LLM Judge contributors" }]
keywords = ["llm", "evaluation", "observability", "judge", "tracing"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.27",
    "click>=8.1",
    "pyyaml>=6.0",
]

[project.scripts]
judge = "judge.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
]

[project.urls]
Homepage = "https://github.com/abhayxcode/llm-judge"
Issues = "https://github.com/abhayxcode/llm-judge/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/judge"]
